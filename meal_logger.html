<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Meal Logger</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── TOKENS ──────────────────────────────────────────── */
    :root {
      --bg:         #0d0d0d;
      --surface:    #1a1a1a;
      --surface2:   #242424;
      --border:     #2e2e2e;
      --accent:     #c8f135;
      --accent-dim: #8aaa20;
      --text:       #f0f0f0;
      --muted:      #666;
      --danger:     #ff4d4d;
      --radius:     10px;
      --font:       'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    /* ── HEADER ──────────────────────────────────────────── */
    header {
      padding: 52px 20px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .header-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    #date-display {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── DAILY TOTALS BAR ────────────────────────────────── */
    #totals-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .total-cell {
      background: var(--surface);
      padding: 12px 8px;
      text-align: center;
    }
    .total-val {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .total-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── MAIN CONTENT ────────────────────────────────────── */
    main { padding: 20px; }

    /* ── SEARCH ──────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    #search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      font-family: var(--font);
      padding: 13px 44px 13px 14px;
    }
    #search-input:focus { outline: none; border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }
    #search-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── SEARCH RESULTS ──────────────────────────────────── */
    #search-results {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .result-item {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:active { background: var(--surface2); }
    .result-name {
      font-size: 14px;
      font-weight: 500;
    }
    .result-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .result-header {
      padding: 8px 14px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    #manual-entry-trigger {
      padding: 12px 14px;
      font-size: 14px;
      color: var(--accent);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-top: 1px solid var(--border);
    }

    /* ── ENTRY FORM ──────────────────────────────────────── */
    #entry-form {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    #entry-form.visible { display: block; }

    #food-name-display {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text);
    }

    .macro-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .macro-field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .macro-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 16px;
      font-family: var(--font);
      padding: 10px 12px;
      -moz-appearance: textfield;
    }
    .macro-field input::-webkit-outer-spin-button,
    .macro-field input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .macro-field input:focus { outline: none; border-color: var(--accent); }

    .form-row {
      margin-bottom: 10px;
    }
    .form-row label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-row input, .form-row select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 16px;
      font-family: var(--font);
      padding: 10px 12px;
    }
    .form-row input:focus, .form-row select:focus {
      outline: none;
      border-color: var(--accent);
    }
    select { appearance: none; -webkit-appearance: none; cursor: pointer; }

    .btn-row { display: flex; gap: 10px; margin-top: 4px; }
    .btn-primary {
      flex: 1;
      padding: 14px;
      background: var(--accent);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-ghost {
      padding: 14px 18px;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── TODAY'S LOG ─────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    #food-list { margin-top: 24px; }

    .food-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px;
      margin-bottom: 8px;
    }
    .food-item-left { flex: 1; min-width: 0; }
    .food-item-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .food-item-macros {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .food-item-cal {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-left: 12px;
      white-space: nowrap;
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 0 4px 12px;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .delete-btn:active { color: var(--danger); }

    #empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── LOADING ─────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 99px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 99;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-label">Meal Logger</div>
    <h1>What did you eat?</h1>
    <div id="date-display"></div>
  </header>

  <!-- ── DAILY TOTALS ───────────────────────────────────── -->
  <div id="totals-bar">
    <div class="total-cell">
      <div class="total-val" id="total-cal">0</div>
      <div class="total-label">cal</div>
    </div>
    <div class="total-cell">
      <div class="total-val" id="total-protein">0g</div>
      <div class="total-label">protein</div>
    </div>
    <div class="total-cell">
      <div class="total-val" id="total-carbs">0g</div>
      <div class="total-label">carbs</div>
    </div>
    <div class="total-cell">
      <div class="total-val" id="total-fat">0g</div>
      <div class="total-label">fat</div>
    </div>
  </div>

  <main>

    <!-- ── SEARCH BAR ─────────────────────────────────────── -->
    <div class="search-wrap">
      <input
        type="text"
        id="search-input"
        placeholder="Search food or enter manually…"
        autocomplete="off"
        autocorrect="off"
      />
      <button id="search-btn" title="Search">⌕</button>
    </div>

    <!-- ── SEARCH RESULTS DROPDOWN ───────────────────────── -->
    <div id="search-results">
      <div class="result-header">Search results — tap to select</div>
      <div id="results-list"></div>
      <div id="manual-entry-trigger">+ Enter macros manually instead</div>
    </div>

    <!-- ── ENTRY FORM ─────────────────────────────────────── -->
    <div id="entry-form">
      <div id="food-name-display">Add food</div>

      <div class="form-row">
        <label>Food name</label>
        <input type="text" id="input-name" placeholder="e.g. Protein shake" />
      </div>

      <div class="macro-grid">
        <div class="macro-field">
          <label>Calories</label>
          <input type="number" id="input-cal" placeholder="0" min="0" />
        </div>
        <div class="macro-field">
          <label>Protein (g)</label>
          <input type="number" id="input-protein" placeholder="0" min="0" step="0.1" />
        </div>
        <div class="macro-field">
          <label>Carbs (g)</label>
          <input type="number" id="input-carbs" placeholder="0" min="0" step="0.1" />
        </div>
        <div class="macro-field">
          <label>Fat (g)</label>
          <input type="number" id="input-fat" placeholder="0" min="0" step="0.1" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-ghost" id="cancel-btn">Cancel</button>
        <button class="btn-primary" id="log-btn">Log it</button>
      </div>
    </div>

    <!-- ── TODAY'S FOOD LIST ──────────────────────────────── -->
    <div id="food-list">
      <div class="section-label">Today's log</div>
      <div id="items-container">
        <div id="empty-state">Nothing logged yet today.<br>Search above to get started.</div>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const SUPABASE_URL = 'https://owgyisrfwdhkknaaguxs.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93Z3lpc3Jmd2Roa2tuYWFndXhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzOTY3NDIsImV4cCI6MjA5Njk3Mjc0Mn0.0g6P_Npu5xmE_ZDCZYDz6nHNnsaqwKvRIY_A0SbOdvU'
const USDA_KEY = 'DEMO_KEY' // free, no signup — rate limited but fine for personal use

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

// ── STATE ──────────────────────────────────────────────────
let todayItems = []   // items logged today, loaded from DB

// ── HELPERS ────────────────────────────────────────────────
function today() {
  return new Date().toISOString().split('T')[0]
}

function formatDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  })
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'show' + (isError ? ' error' : '')
  setTimeout(() => { el.className = '' }, 2800)
}

function round1(n) { return Math.round((n || 0) * 10) / 10 }

// ── INIT ───────────────────────────────────────────────────
document.getElementById('date-display').textContent = formatDate(today())

async function init() {
  await ensureDailyLog()
  await loadTodayItems()
}

// Ensure a daily_log row exists for today
async function ensureDailyLog() {
  const { data, error } = await db
    .from('daily_log')
    .select('log_id')
    .eq('date', today())
    .maybeSingle()

  if (!data && !error) {
    await db.from('daily_log').insert({ date: today() })
  }
}

// ── LOAD TODAY'S ITEMS ─────────────────────────────────────
async function loadTodayItems() {
  const { data, error } = await db
    .from('meals')
    .select('*')
    .eq('date', today())
    .order('logged_at', { ascending: true })

  if (error) { toast('Failed to load today\'s log', true); return }
  todayItems = data || []
  renderItems()
  updateTotals()
}

// ── RENDER FOOD LIST ───────────────────────────────────────
function renderItems() {
  const container = document.getElementById('items-container')
  const empty = document.getElementById('empty-state')

  if (todayItems.length === 0) {
    empty.style.display = 'block'
    container.querySelectorAll('.food-item').forEach(el => el.remove())
    return
  }

  empty.style.display = 'none'
  container.querySelectorAll('.food-item').forEach(el => el.remove())

  todayItems.forEach(item => {
    const el = document.createElement('div')
    el.className = 'food-item'
    el.innerHTML = `
      <div class="food-item-left">
        <div class="food-item-name">${item.meal_name}</div>
        <div class="food-item-macros">P ${round1(item.protein_g)}g · C ${round1(item.carbs_g)}g · F ${round1(item.fat_g)}g</div>
      </div>
      <div class="food-item-cal">${item.calories || 0}</div>
      <button class="delete-btn" data-id="${item.meal_id}" title="Remove">×</button>
    `
    el.querySelector('.delete-btn').addEventListener('click', () => deleteItem(item.meal_id))
    container.appendChild(el)
  })
}

// ── UPDATE TOTALS ──────────────────────────────────────────
function updateTotals() {
  const totals = todayItems.reduce((acc, item) => ({
    cal:     acc.cal     + (item.calories   || 0),
    protein: acc.protein + (item.protein_g  || 0),
    carbs:   acc.carbs   + (item.carbs_g    || 0),
    fat:     acc.fat     + (item.fat_g      || 0)
  }), { cal: 0, protein: 0, carbs: 0, fat: 0 })

  document.getElementById('total-cal').textContent     = Math.round(totals.cal)
  document.getElementById('total-protein').textContent = round1(totals.protein) + 'g'
  document.getElementById('total-carbs').textContent   = round1(totals.carbs) + 'g'
  document.getElementById('total-fat').textContent     = round1(totals.fat) + 'g'
}

// ── DELETE ITEM ────────────────────────────────────────────
async function deleteItem(mealId) {
  const { error } = await db.from('meals').delete().eq('meal_id', mealId)
  if (error) { toast('Delete failed', true); return }
  todayItems = todayItems.filter(i => i.meal_id !== mealId)
  renderItems()
  updateTotals()
  toast('Removed')
}

// ── USDA FOOD SEARCH ───────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', searchFood)
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchFood()
})

async function searchFood() {
  const query = document.getElementById('search-input').value.trim()
  if (!query) return

  const btn = document.getElementById('search-btn')
  btn.innerHTML = '<span class="spinner"></span>'

  try {
    const url = `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(query)}&pageSize=6&api_key=${USDA_KEY}`
    const res = await fetch(url)
    const data = await res.json()

    renderSearchResults(data.foods || [])
  } catch (err) {
    toast('Search failed — enter manually', true)
    showManualForm(query)
  } finally {
    btn.textContent = '⌕'
  }
}

function renderSearchResults(foods) {
  const resultsList = document.getElementById('results-list')
  const searchResults = document.getElementById('search-results')

  resultsList.innerHTML = ''

  if (foods.length === 0) {
    resultsList.innerHTML = '<div class="result-item" style="color:var(--muted)">No results found</div>'
  } else {
    foods.forEach(food => {
      // Pull nutrients we care about
      const getNutrient = (id) => {
        const n = food.foodNutrients?.find(n => n.nutrientId === id)
        return n ? round1(n.value) : 0
      }
      const cal     = getNutrient(1008)
      const protein = getNutrient(1003)
      const carbs   = getNutrient(1005)
      const fat     = getNutrient(1004)

      const item = document.createElement('div')
      item.className = 'result-item'
      item.innerHTML = `
        <div class="result-name">${food.description}</div>
        <div class="result-meta">${cal} cal · P ${protein}g · C ${carbs}g · F ${fat}g · per 100g</div>
      `
      item.addEventListener('click', () => {
        selectFood(food.description, cal, protein, carbs, fat)
      })
      resultsList.appendChild(item)
    })
  }

  searchResults.style.display = 'block'
}

// ── MANUAL ENTRY TRIGGER ───────────────────────────────────
document.getElementById('manual-entry-trigger').addEventListener('click', () => {
  const query = document.getElementById('search-input').value.trim()
  document.getElementById('search-results').style.display = 'none'
  showManualForm(query)
})

// ── SELECT A FOOD FROM RESULTS ─────────────────────────────
function selectFood(name, cal, protein, carbs, fat) {
  document.getElementById('search-results').style.display = 'none'
  document.getElementById('input-name').value    = name
  document.getElementById('input-cal').value     = cal
  document.getElementById('input-protein').value = protein
  document.getElementById('input-carbs').value   = carbs
  document.getElementById('input-fat').value     = fat
  document.getElementById('food-name-display').textContent = 'Review & adjust'
  showForm()
}

// ── SHOW MANUAL FORM ───────────────────────────────────────
function showManualForm(prefillName = '') {
  document.getElementById('input-name').value    = prefillName
  document.getElementById('input-cal').value     = ''
  document.getElementById('input-protein').value = ''
  document.getElementById('input-carbs').value   = ''
  document.getElementById('input-fat').value     = ''
  document.getElementById('food-name-display').textContent = 'Enter macros'
  showForm()
}

function showForm() {
  document.getElementById('entry-form').classList.add('visible')
  document.getElementById('input-name').focus()
}

function hideForm() {
  document.getElementById('entry-form').classList.remove('visible')
  document.getElementById('search-input').value = ''
  document.getElementById('search-results').style.display = 'none'
}

document.getElementById('cancel-btn').addEventListener('click', hideForm)

// ── LOG FOOD ───────────────────────────────────────────────
document.getElementById('log-btn').addEventListener('click', logFood)

async function logFood() {
  const name    = document.getElementById('input-name').value.trim()
  const cal     = parseFloat(document.getElementById('input-cal').value)     || 0
  const protein = parseFloat(document.getElementById('input-protein').value) || 0
  const carbs   = parseFloat(document.getElementById('input-carbs').value)   || 0
  const fat     = parseFloat(document.getElementById('input-fat').value)     || 0

  if (!name) { toast('Add a food name first', true); return }

  const btn = document.getElementById('log-btn')
  btn.disabled = true
  btn.textContent = 'Saving…'

  const { data, error } = await db.from('meals').insert({
    date:       today(),
    meal_name:  name,
    calories:   cal,
    protein_g:  protein,
    carbs_g:    carbs,
    fat_g:      fat
  }).select().single()

  if (error) {
    toast('Save failed: ' + error.message, true)
    btn.disabled = false
    btn.textContent = 'Log it'
    return
  }

  todayItems.push(data)
  renderItems()
  updateTotals()
  hideForm()
  toast(`${name} logged ✓`)

  btn.disabled = false
  btn.textContent = 'Log it'
}

// ── START ──────────────────────────────────────────────────
init()
</script>
</body>
</html>
